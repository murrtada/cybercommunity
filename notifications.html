<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Cyber Security Community</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">CyberSec<span>Community</span></a>
      <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">&#9776;</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="posts.html">Posts</a></li>
        <li><a href="writeups.html">Writeups</a></li>
        <li><a href="videos.html">Videos</a></li>
        <li id="auth-state"><a href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <section class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;">
        <h1 class="section-title" style="margin:0;">Notifications</h1>
        <button id="mark-all-read-btn" class="btn btn-outline" style="display:none;" onclick="markAllNotifRead()">Mark All Read</button>
      </div>
      <div id="notifications-page" style="margin-top:1.5rem;">
        <div class="loading">Loading...</div>
      </div>
    </section>
  </div>

  <footer class="footer">
    <div class="container">
      &copy; 2026 Cyber Security Community. All rights reserved.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/main.js"></script>
  <script>
    async function loadNotifPage() {
      const container = document.getElementById('notifications-page');
      if (!currentUser) {
        container.innerHTML = '<div class="empty-state"><h3>Login required</h3><p><a href="login.html">Sign in</a> to view your notifications.</p></div>';
        return;
      }

      const allNotifs = await fetchNotifications(100);
      const unreadCount = await getUnreadCount();
      const markBtn = document.getElementById('mark-all-read-btn');
      if (markBtn) markBtn.style.display = unreadCount > 0 ? 'inline-block' : 'none';

      if (allNotifs.length === 0) {
        container.innerHTML = '<div class="empty-state"><span style="font-size:3rem;">🔔</span><h3>No notifications yet</h3><p>When someone likes or comments on your content, it will appear here.</p></div>';
        return;
      }

      container.innerHTML = `<div class="notif-page-list">${allNotifs.map(renderNotifItem).join('')}</div>`;
    }
    onReady(loadNotifPage);
    function toggleMenu() { document.getElementById('nav-links').classList.toggle('open'); }
  </script>
</body>
</html>
