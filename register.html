<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Cyber Security Community</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">CyberSec<span>Community</span></a>
      <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">&#9776;</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="posts.html">Posts</a></li>
        <li><a href="writeups.html">Writeups</a></li>
        <li><a href="services.html">Contact</a></li>
        <li><a href="videos.html">Videos</a></li>
        <li id="auth-state"><a href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <section class="section">
      <form class="auth-form" onsubmit="handleRegister(event)">
        <h2>Create Account</h2>
        <p class="subtitle">Join the Cyber Security Community.</p>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="John Doe" />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" />
          <div class="hint">A verification email will be sent to this address.</div>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="johndoe" minlength="3" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Min. 6 characters" minlength="6" />
        </div>

        <button type="submit" class="btn btn-primary">Create Account</button>

        <div class="auth-alt">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </form>
    </section>
  </div>

  <footer class="footer">
    <div class="container">
      &copy; 2026 Cyber Security Community. All rights reserved.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    function toggleMenu() {
      document.getElementById('nav-links').classList.toggle('open');
    }
  </script>
</body>
</html>
